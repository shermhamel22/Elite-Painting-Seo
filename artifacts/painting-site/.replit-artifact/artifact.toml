kind = "web"
previewPath = "/"
title = "Elite Painting Solutions"
version = "1.0.0"
id = "artifacts/painting-site"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25860

[services.development]
run = "pnpm --filter @workspace/painting-site run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/painting-site", "run", "build" ]
publicDir = "artifacts/painting-site/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25860"
BASE_PATH = "/"
