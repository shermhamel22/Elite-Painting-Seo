name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Clean Replit specific config
        run: |
          # Standard pnpm doesn't support Replit's custom security settings
          # This safely removes those settings before installation
          awk '/^packages:/,0' pnpm-workspace.yaml > clean.yaml
          mv clean.yaml pnpm-workspace.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        env:
          PORT: 3000
          BASE_PATH: /Elite-Painting-Seo/
        run: |
          pnpm run build
          # Create a 404.html to handle client-side routing on GitHub Pages
          cp artifacts/painting-site/dist/public/index.html artifacts/painting-site/dist/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/painting-site/dist/public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
